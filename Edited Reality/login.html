<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM OVERRIDE — CLASSIFIED</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-primary);
            overflow: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            z-index: 2;
            position: relative;
            background: var(--bg-card);
            border: 1px solid var(--neon-red);
            padding: 50px 40px;
            text-align: center;
            box-shadow: var(--glow-red);
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-red), transparent);
        }

        .auth-logo {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 900;
            color: var(--neon-red);
            letter-spacing: 5px;
            margin-bottom: 10px;
            text-shadow: var(--glow-red);
        }

        .auth-subtitle {
            color: var(--text-dim);
            font-size: 0.8rem;
            letter-spacing: 3px;
            margin-bottom: 40px;
            font-family: var(--font-mono);
        }

        .auth-input-group {
            position: relative;
            margin-bottom: 30px;
        }

        .auth-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 23, 68, 0.4);
            color: var(--neon-red);
            font-family: var(--font-mono);
            font-size: 1.2rem;
            text-align: center;
            padding: 16px;
            letter-spacing: 8px;
            outline: none;
            transition: all 0.3s ease;
        }

        .auth-input:focus {
            border-color: var(--neon-red);
            box-shadow: 0 0 15px rgba(255, 23, 68, 0.2);
        }

        .auth-input::placeholder {
            color: rgba(255, 23, 68, 0.2);
            letter-spacing: 4px;
        }

        .auth-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--neon-red);
            color: var(--neon-red);
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 700;
            padding: 16px;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .auth-btn:hover {
            background: var(--neon-red);
            color: var(--bg-primary);
            box-shadow: var(--glow-red);
        }

        .auth-error {
            color: var(--neon-red);
            font-family: var(--font-mono);
            font-size: 0.8rem;
            margin-top: 20px;
            min-height: 20px;
            letter-spacing: 1px;
            text-shadow: var(--glow-red);
        }

        .home-link {
            display: inline-block;
            margin-top: 30px;
            color: var(--text-dim);
            font-family: var(--font-mono);
            font-size: 0.7rem;
            text-decoration: none;
            letter-spacing: 2px;
            transition: color 0.3s;
        }

        .home-link:hover {
            color: var(--neon-blue);
        }
    </style>
</head>
<body>
    <div class="scanline-overlay" aria-hidden="true"></div>

    <div class="login-container">
        <h1 class="auth-logo">SYS://AUTH</h1>
        <p class="auth-subtitle">ENTER OVERRIDE KEY</p>

        <form id="login-form">
            <div class="auth-input-group">
                <input type="password" id="password" class="auth-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="auth-btn" id="submit-btn">[ VERIFY ]</button>
        </form>

        <div id="error-msg" class="auth-error"></div>

        <a href="/" class="home-link">← RETURN TO PUBLIC SECTOR</a>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const submitBtn = document.getElementById('submit-btn');

            submitBtn.textContent = '[ VERIFYING... ]';
            errorMsg.textContent = '';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                if (res.ok) {
                    submitBtn.style.background = 'var(--neon-green)';
                    submitBtn.style.color = 'var(--bg-primary)';
                    submitBtn.style.borderColor = 'var(--neon-green)';
                    submitBtn.textContent = '[ ACCESS GRANTED ]';
                    setTimeout(() => {
                        window.location.href = '/admin.html';
                    }, 800);
                } else {
                    submitBtn.textContent = '[ VERIFY ]';
                    document.getElementById('password').value = '';
                    errorMsg.textContent = '❌ ACCESS DENIED';
                }
            } catch (err) {
                submitBtn.textContent = '[ VERIFY ]';
                errorMsg.textContent = '❌ SYSTEM ERROR';
            }
        });
    </script>
</body>
</html>
